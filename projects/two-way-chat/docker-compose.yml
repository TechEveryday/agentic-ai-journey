version: '3.9'
services:
  api:
    build:
      context: ./backend
      dockerfile: Chat.Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
      target: build
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_HUB_URL=http://localhost:5000/hubs/chat
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api
